<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>George's Daily Schedule</title>
  <style>
    /* ============================================================
       STYLES — George's Sleep Calculator
       Large text, warm colors, grandparent-friendly
    ============================================================ */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      background: #f5f0e8;
      color: #333;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #4a7ec7 0%, #7fb3f5 100%);
      color: white;
      text-align: center;
      padding: 32px 20px 26px;
    }
    .header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 4px; }
    .header p  { font-size: 1.05rem; opacity: 0.88; }

    /* ── Morning wake section ── */
    .wake-section {
      background: white;
      padding: 24px 20px;
      border-bottom: 2px solid #e4ddd0;
      text-align: center;
    }
    .wake-section label {
      display: block;
      font-size: 1.25rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 14px;
    }
    .wake-input-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #eef4ff;
      border: 3px solid #4a7ec7;
      border-radius: 18px;
      padding: 10px 26px;
    }
    #morningWake {
      font-size: 2.4rem;
      font-weight: 800;
      color: #222;
      border: none;
      background: transparent;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
    }

    /* ── Schedule container ── */
    .schedule-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── Empty state ── */
    .empty-state {
      background: white;
      border-radius: 22px;
      padding: 48px 24px;
      text-align: center;
      color: #bbb;
      font-size: 1.2rem;
      line-height: 1.7;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }
    .empty-state .emoji { font-size: 3.6rem; margin-bottom: 14px; }

    /* ── Event cards ── */
    .event-card {
      background: white;
      border-radius: 20px;
      padding: 20px 22px 22px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }

    .card-morning  { border-left: 6px solid #f5c842; }
    .card-sleep    { border-left: 6px solid #4a7ec7; }
    .card-catnap   { border-left: 6px solid #f5a033; background: #fffdf5; }
    .card-bedtime  { border-left: 6px solid #9b59b6; background: #faf5ff; }

    .ev-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 3px;
    }
    .ev-time {
      font-size: 2.6rem;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1;
      margin-bottom: 4px;
    }
    .ev-note { font-size: 0.92rem; color: #aaa; }

    /* ── Actual nap-start input (green tint — "when he fell asleep") ── */
    .actual-start-wrap {
      margin-top: 14px;
      padding: 14px 16px;
      background: #f0fff4;
      border-radius: 12px;
      border: 2px dashed #81c995;
    }
    .actual-start-wrap label {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
      color: #2e7d52;
      margin-bottom: 8px;
    }
    .actual-start-wrap input[type="time"] {
      font-size: 1.75rem;
      font-weight: 700;
      color: #222;
      border: 2px solid #a5d6a7;
      border-radius: 10px;
      padding: 7px 18px;
      background: white;
      outline: none;
      cursor: pointer;
      width: 100%;
      max-width: 230px;
      -webkit-appearance: none;
      display: block;
    }
    .actual-start-wrap input[type="time"]:focus {
      border-color: #2e7d52;
      box-shadow: 0 0 0 3px rgba(46,125,82,.15);
    }
    .actual-start-wrap input[type="time"].filled {
      border-color: #2e7d52;
      background: #e8f5e9;
    }
    .actual-start-wrap .hint {
      font-size: .82rem;
      color: #93c9a1;
      margin-top: 6px;
    }

    /* ── Predicted wake row ── */
    .predicted-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding: 12px 16px;
      background: #eef4ff;
      border-radius: 12px;
    }
    .predicted-row .p-label { font-size: .92rem; color: #666; flex: 1; }
    .predicted-row .p-time  {
      font-size: 1.45rem;
      font-weight: 800;
      color: #4a7ec7;
    }

    /* ── Actual wake input (grey — "when he woke up") ── */
    .actual-wake-wrap {
      margin-top: 10px;
      padding: 14px 16px;
      background: #f8f9fa;
      border-radius: 12px;
      border: 2px dashed #d0d0d0;
    }
    .actual-wake-wrap label {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 8px;
    }
    .actual-wake-wrap input[type="time"] {
      font-size: 1.75rem;
      font-weight: 700;
      color: #222;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 7px 18px;
      background: white;
      outline: none;
      cursor: pointer;
      width: 100%;
      max-width: 230px;
      -webkit-appearance: none;
      display: block;
    }
    .actual-wake-wrap input[type="time"]:focus {
      border-color: #4a7ec7;
      box-shadow: 0 0 0 3px rgba(74,126,199,.18);
    }
    .actual-wake-wrap input[type="time"].filled {
      border-color: #4caf50;
      background: #f0fff2;
    }
    .actual-wake-wrap .hint {
      font-size: .82rem;
      color: #bbb;
      margin-top: 6px;
    }

    /* ── Clear button (shared) ── */
    .clear-btn {
      display: inline-block;
      margin-top: 8px;
      font-size: .85rem;
      color: #aaa;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
    }
    .clear-btn:hover { color: #555; }

    /* ── Short-nap note ── */
    .short-nap-note {
      margin-top: 10px;
      padding: 9px 13px;
      background: #fff3e0;
      border-radius: 8px;
      font-size: .9rem;
      color: #a05000;
    }

    /* ── Catnap end time ── */
    .catnap-end {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding: 12px 16px;
      background: #fff3e0;
      border-radius: 12px;
    }
    .catnap-end .p-label { font-size: .92rem; color: #a05000; flex: 1; }
    .catnap-end .p-time  { font-size: 1.45rem; font-weight: 800; color: #c05000; }

    /* ── Bedtime status ── */
    .bedtime-status {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 11px;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.45;
    }
    .status-good         { background: #e6f9ee; color: #1a7f42; }
    .status-early        { background: #e3f0ff; color: #1a5fa8; }
    .status-slightly-late{ background: #fff8e0; color: #9c6500; }
    .status-late         { background: #fff0e0; color: #c04000; }

    /* ── Total sleep summary ── */
    .sleep-summary {
      margin-top: 6px;
      padding: 14px 18px;
      background: white;
      border-radius: 14px;
      font-size: .95rem;
      color: #666;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sleep-summary .total {
      font-size: 1.2rem;
      font-weight: 800;
      color: #4a7ec7;
    }

    /* ── Connector between cards ── */
    .connector {
      width: 3px;
      height: 18px;
      background: #ddd;
      margin: 0 auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════
       HEADER
  ════════════════════════════════════ -->
  <div class="header">
    <h1>🌟 George's Day</h1>
    <p>Daily sleep schedule — updated as you go</p>
  </div>

  <!-- ════════════════════════════════════
       MORNING WAKE INPUT
  ════════════════════════════════════ -->
  <div class="wake-section">
    <label for="morningWake">☀️ What time did George wake up this morning?</label>
    <div class="wake-input-wrap">
      <input type="time" id="morningWake" aria-label="Morning wake time" />
    </div>
  </div>

  <!-- ════════════════════════════════════
       SCHEDULE OUTPUT
  ════════════════════════════════════ -->
  <div class="schedule-wrap">
    <div id="schedule">
      <div class="empty-state">
        <div class="emoji">👆</div>
        Enter George's wake time above<br>to see today's schedule
      </div>
    </div>
  </div>

  <script>
  // ============================================================
  // GEORGE'S SLEEP SCHEDULE — CONFIGURATION
  //
  // George is ~7 months old as of May 2026.
  // He is transitioning from 3 naps → 2 naps.
  //
  // ⬇️  UPDATE THESE VALUES as George grows and his schedule changes.
  // All times are in MINUTES unless noted.
  // ============================================================

  const CONFIG = {

    // ── WAKE WINDOWS ─────────────────────────────────────────
    // How long George stays awake between sleep periods.
    // These naturally grow longer as he gets older.

    WW_MORNING:            135,  // Morning wake → Nap 1     (2h 15m)
    WW_NAP1_TO_NAP2:       150,  // Nap 1 wake  → Nap 2     (2h 30m)
    WW_NAP1_SHORT_TO_NAP2: 135,  // Nap 1 SHORT → Nap 2     (2h 15m, shorter because tired)

    // At 7 months on a 2-nap schedule the LAST wake window is long — up to 4.5 hours.
    // Bedtime is ANCHORED to 7:00 PM rather than computed from a fixed wake window.
    // MIN = shortest acceptable gap before bed; MAX = threshold that triggers a catnap.
    WW_NAP2_TO_BED_MIN:    150,  // 2h 30m — shortest reasonable last wake window
    WW_NAP2_TO_BED_MAX:    270,  // 4h 30m — if gap would exceed this, suggest catnap

    WW_CATNAP_TO_BED:      120,  // Catnap wake → Bedtime   (2h — catnap is brief)

    // ── NAP DURATIONS ────────────────────────────────────────
    // TARGET = ideal length; MAX = cap (mom never lets him go past max).
    // Keeping Nap 1 shorter helps Nap 2 be longer.

    NAP1_TARGET:  60,   // Nap 1 ideal: 1h
    NAP1_MAX:     75,   // Nap 1 cap:   1h 15m

    NAP2_TARGET:  120,  // Nap 2 ideal: 2h
    NAP2_MAX:     150,  // Nap 2 cap:   2h 30m (but never past NAP2_LATEST_END)
    NAP2_LATEST_END: { h: 16, m: 30 },  // Hard cap: never wake him after 4:30 PM

    CATNAP_DURATION: 20, // Optional catnap: 20 min

    // ── SHORT NAP THRESHOLD ──────────────────────────────────
    // If a nap is this short or under, it's flagged as short.

    SHORT_NAP_MIN: 45,

    // ── CATNAP WINDOW ────────────────────────────────────────
    // Catnap is offered when Nap 2 ends too early (> 4.5h gap to 7 PM)
    // OR Nap 2 was very short. It is placed to end around 5:00 PM → bed at 7:00 PM.

    CATNAP_EARLIEST:       { h: 16, m: 15 },  // Not before 4:15 PM
    CATNAP_LATEST:         { h: 17, m: 15 },  // Not after  5:15 PM
    CATNAP_GAP_AFTER_NAP2: 60,                 // At least 1h gap after Nap 2 ends
    CATNAP_TARGET_END:     { h: 17, m:  0 },  // Aim to end by 5:00 PM → 7:00 PM bed

    // ── BEDTIME ──────────────────────────────────────────────
    BEDTIME_MIN:         { h: 18, m: 45 },  // 6:45 PM  — never before this
    BEDTIME_IDEAL_START: { h: 19, m:  0 },  // 7:00 PM  — ideal window opens
    BEDTIME_IDEAL_END:   { h: 19, m: 30 },  // 7:30 PM  — ideal window closes
    BEDTIME_LATE_WARN:   { h: 19, m: 45 },  // 7:45 PM  — flag as running late

    // ── TOTAL DAYTIME SLEEP TARGET ───────────────────────────
    DAYTIME_SLEEP_TARGET: 180,  // 3 hours
  };


  // ============================================================
  // TIME UTILITIES
  // ============================================================

  // "07:30" → 450  (minutes since midnight)
  function toMins(str) {
    if (!str) return null;
    const parts = str.split(':');
    if (parts.length < 2) return null;
    const h = parseInt(parts[0], 10);
    const m = parseInt(parts[1], 10);
    if (isNaN(h) || isNaN(m)) return null;
    return h * 60 + m;
  }

  // 450 → "07:30"
  function toStr(mins) {
    if (mins == null || isNaN(mins)) return null;
    const h = Math.floor(mins / 60) % 24;
    const m = Math.round(mins % 60);
    return pad(h) + ':' + pad(m);
  }

  // {h:7, m:30} → 450
  function cfgMins(c) { return c.h * 60 + c.m; }

  // "07:30" → "7:30 AM"
  function friendly(str) {
    if (!str) return '—';
    const mins = toMins(str);
    if (mins == null) return '—';
    const h    = Math.floor(mins / 60) % 24;
    const m    = mins % 60;
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12  = h % 12 || 12;
    return `${h12}:${pad(m)} ${ampm}`;
  }

  // Format minutes duration as "1h 15m"
  function fmtDuration(mins) {
    if (mins == null || mins <= 0) return '—';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    if (h === 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h ${m}m`;
  }

  function pad(n) { return String(n).padStart(2, '0'); }


  // ============================================================
  // CORE SCHEDULE CALCULATION
  //
  // Inputs:
  //   morningWakeStr    — "07:00"  morning wake time
  //   actualNapStart[i] — actual time George FELL ASLEEP for each nap
  //   actualWake[i]     — actual time George WOKE UP from each nap
  //
  // If actualNapStart[i] is set, the predicted wake for that nap is
  // computed from the actual start (not the suggested start). This means
  // a late fall-asleep time pushes the predicted wake later, which then
  // cascades to the next nap's suggested start.
  //
  // If actualWake[i] is also set, that overrides the predicted wake.
  //
  // Returns an array of event objects for the renderer.
  // ============================================================

  function buildSchedule(morningWakeStr, actualNapStart, actualWake) {
    const events = [];
    const C = CONFIG;

    const mwMins = toMins(morningWakeStr);
    if (mwMins == null) return events;

    // ── MORNING WAKE ─────────────────────────────────────────
    events.push({
      type:  'morning',
      label: 'Good Morning! ☀️',
      time:  mwMins,
      note:  'Start of the day',
    });


    // ── NAP 1 ────────────────────────────────────────────────

    // Suggested start: morning wake + wake window
    const nap1Suggested = mwMins + C.WW_MORNING;

    // Actual start: grandparent override (or fall back to suggested)
    const nap1ActualStartStr  = actualNapStart[0] || null;
    const nap1ActualStartMins = toMins(nap1ActualStartStr);
    const nap1Start = (nap1ActualStartMins != null) ? nap1ActualStartMins : nap1Suggested;

    // Predicted wake: based on effective start (actual OR suggested) + target duration
    const nap1PredEnd = nap1Start + Math.min(C.NAP1_TARGET, C.NAP1_MAX);

    // Actual wake: grandparent override (or fall back to predicted)
    const nap1ActualWakeStr  = actualWake[0] || null;
    const nap1ActualWakeMins = toMins(nap1ActualWakeStr);
    const nap1End = (nap1ActualWakeMins != null) ? nap1ActualWakeMins : nap1PredEnd;

    // Duration and short-nap check
    const nap1Dur   = nap1End - nap1Start;
    const nap1Short = nap1Dur <= C.SHORT_NAP_MIN;

    events.push({
      type:              'sleep',
      napIndex:          0,
      label:             'Nap 1 😴',
      suggestedStart:    nap1Suggested,     // computed from wake window (for display)
      effectiveStart:    nap1Start,         // actual or suggested (used in math)
      actualStartStr:    nap1ActualStartStr,
      predEndMins:       nap1PredEnd,
      actualWakeStr:     nap1ActualWakeStr,
      endMins:           nap1End,
      durMins:           nap1Dur,
      isShort:           nap1Short,
      note:              'Put George down around this time',
    });


    // ── NAP 2 ────────────────────────────────────────────────

    // Shorten wake window if Nap 1 was short (he'll be more tired)
    const ww2      = nap1Short ? C.WW_NAP1_SHORT_TO_NAP2 : C.WW_NAP1_TO_NAP2;
    const nap2Suggested = nap1End + ww2;

    const nap2ActualStartStr  = actualNapStart[1] || null;
    const nap2ActualStartMins = toMins(nap2ActualStartStr);
    const nap2Start = (nap2ActualStartMins != null) ? nap2ActualStartMins : nap2Suggested;

    // "Wake up by" for Nap 2: capped at 4:30 PM so the last wake window stays 3–4h
    const nap2LatestEnd = cfgMins(C.NAP2_LATEST_END);
    const nap2PredEnd = Math.min(nap2Start + Math.min(C.NAP2_TARGET, C.NAP2_MAX), nap2LatestEnd);

    const nap2ActualWakeStr  = actualWake[1] || null;
    const nap2ActualWakeMins = toMins(nap2ActualWakeStr);
    const nap2End = (nap2ActualWakeMins != null) ? nap2ActualWakeMins : nap2PredEnd;

    const nap2Dur   = nap2End - nap2Start;
    const nap2Short = nap2Dur <= C.SHORT_NAP_MIN;

    events.push({
      type:              'sleep',
      napIndex:          1,
      label:             'Nap 2 😴',
      suggestedStart:    nap2Suggested,
      effectiveStart:    nap2Start,
      actualStartStr:    nap2ActualStartStr,
      predEndMins:       nap2PredEnd,
      actualWakeStr:     nap2ActualWakeStr,
      endMins:           nap2End,
      durMins:           nap2Dur,
      isShort:           nap2Short,
      note:              "Try to overlap with the toddler's nap (1:00–3:30 PM)",
    });


    // ── OPTIONAL CATNAP ──────────────────────────────────────
    //
    // At 7 months on a 2-nap schedule, the last wake window before bed
    // is naturally long — 3–4.5 hours is normal. Bedtime TARGETS 7:00 PM.
    //
    // Suggest a catnap when:
    //   (a) Nap 2 ends so early the gap to 7:00 PM would be > 4.5h, OR
    //   (b) Nap 2 was very short (he needs more sleep to make it)
    //
    // The catnap is placed to end around 5:00 PM → bed at 7:00 PM (2h after).

    const bedtimeIdealStart = cfgMins(C.BEDTIME_IDEAL_START);  // 7:00 PM
    const bedtimeMin        = cfgMins(C.BEDTIME_MIN);          // 6:45 PM

    const needsCatnap = (nap2End + C.WW_NAP2_TO_BED_MAX < bedtimeIdealStart) || nap2Short;

    let lastSleepEnd = nap2End;

    if (needsCatnap) {
      const catnapEndTarget  = cfgMins(C.CATNAP_TARGET_END);       // 5:00 PM
      const catnapStartIdeal = catnapEndTarget - C.CATNAP_DURATION; // 4:40 PM
      const earliest    = cfgMins(C.CATNAP_EARLIEST);              // 4:15 PM
      const latest      = cfgMins(C.CATNAP_LATEST);               // 5:15 PM
      const minGapStart = nap2End + C.CATNAP_GAP_AFTER_NAP2;

      const catnapStart = Math.max(
        Math.max(earliest, minGapStart),
        Math.min(latest, catnapStartIdeal)
      );
      const catnapEnd = catnapStart + C.CATNAP_DURATION;

      events.push({
        type:        'catnap',
        label:       'Optional Catnap 💤',
        time:        catnapStart,
        note:        "Only if he seems tired — skip it when you can!",
        predEndMins: catnapEnd,
      });

      lastSleepEnd = catnapEnd;
    }


    // ── BEDTIME ──────────────────────────────────────────────
    //
    // Bedtime is ANCHORED to 7:00 PM. It only shifts later if Nap 2
    // (or the catnap) ended so late that the minimum 2h30m wake window
    // pushes past 7:00 PM. Always clamped to no earlier than 6:45 PM.

    let bedMins;
    if (needsCatnap) {
      bedMins = lastSleepEnd + C.WW_CATNAP_TO_BED;
    } else {
      bedMins = Math.max(bedtimeIdealStart, nap2End + C.WW_NAP2_TO_BED_MIN);
    }
    if (bedMins < bedtimeMin) bedMins = bedtimeMin;

    const bdIdealEnd = cfgMins(C.BEDTIME_IDEAL_END);
    const bdLateWarn = cfgMins(C.BEDTIME_LATE_WARN);

    let bedStatus, bedMsg;
    if (bedMins < bedtimeIdealStart) {
      bedStatus = 'early';
      bedMsg    = '💙 Running a bit early — wait until at least 6:45 PM';
    } else if (bedMins <= bdIdealEnd) {
      bedStatus = 'good';
      bedMsg    = '✅ Right in the sweet spot — great day!';
    } else if (bedMins <= bdLateWarn) {
      bedStatus = 'slightly-late';
      bedMsg    = '🕯️ Slightly late — try to get him down by 7:30 PM';
    } else {
      bedStatus = 'late';
      bedMsg    = '⚠️ Bedtime may run late — aim for 7:30 PM if possible';
    }

    // Total predicted daytime sleep
    const totalDaytimeMins =
      (nap1End - nap1Start) +
      (nap2End - nap2Start) +
      (needsCatnap ? C.CATNAP_DURATION : 0);

    events.push({
      type:            'bedtime',
      label:           'Bedtime 🌙',
      time:            bedMins,
      note:            'Target window: 7:00–7:30 PM',
      bedStatus,
      bedMsg,
      totalDaytimeMins,
    });

    return events;
  }


  // ============================================================
  // RENDERER
  //
  // Builds the DOM from the event list. wireInputs() is called
  // exactly ONCE at the end — fixing the double-listener crash
  // that occurred when the bedtime card's early `return` inside
  // forEach caused wireInputs to run both inside and after the loop.
  // ============================================================

  function render() {
    const morningWakeStr = document.getElementById('morningWake').value;
    const container      = document.getElementById('schedule');

    if (!morningWakeStr) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">👆</div>
          Enter George's wake time above<br>to see today's schedule
        </div>`;
      return;
    }

    const events = buildSchedule(morningWakeStr, actualNapStart, actualWake);
    if (!events || events.length === 0) return;

    container.innerHTML = '';

    events.forEach((ev, idx) => {

      // Thin connector between cards
      if (idx > 0) {
        const conn = document.createElement('div');
        conn.className = 'connector';
        container.appendChild(conn);
      }

      const card = document.createElement('div');
      card.className = 'event-card ' + ({
        morning: 'card-morning',
        sleep:   'card-sleep',
        catnap:  'card-catnap',
        bedtime: 'card-bedtime',
      }[ev.type] || 'card-sleep');

      // ── Base: label + big time + note ──────────────────────
      // For sleep cards the big time shows the SUGGESTED start.
      // (The actual fall-asleep time, if entered, is shown in the green input below.)
      let html = `
        <div class="ev-label">${ev.label}</div>
        <div class="ev-time">${friendly(toStr(ev.type === 'sleep' ? ev.suggestedStart : ev.time))}</div>
        <div class="ev-note">${ev.note}</div>
      `;

      // ── Sleep card extras ───────────────────────────────────
      if (ev.type === 'sleep') {
        const n = ev.napIndex + 1;
        const startVal = actualNapStart[ev.napIndex] || '';
        const wakeVal  = actualWake[ev.napIndex] || '';
        const startFilled = !!startVal;
        const wakeFilled  = !!wakeVal;

        // Green section: actual fall-asleep time
        html += `
          <div class="actual-start-wrap">
            <label for="start${n}">He actually fell asleep at:</label>
            <input
              type="time"
              id="start${n}"
              data-nap-start="${ev.napIndex}"
              value="${startVal}"
              class="${startFilled ? 'filled' : ''}"
              aria-label="Actual fall-asleep time for nap ${n}"
            />
            <div class="hint">Leave blank if he fell asleep right on time</div>
            ${startFilled ? `<button class="clear-btn" data-clear-start="${ev.napIndex}">✕ Clear</button>` : ''}
          </div>
        `;

        // "Wake him up by" — the latest he should sleep to protect the next wake window
        const predWakeNote = startFilled
          ? `If he fell asleep at ${friendly(startVal)}`
          : 'Based on suggested nap time';
        html += `
          <div class="predicted-row">
            <div class="p-label">⏰ Wake him up by:<br><span style="font-size:.8rem;color:#aaa;font-weight:400;">${predWakeNote}</span></div>
            <div class="p-time">${friendly(toStr(ev.predEndMins))}</div>
          </div>
        `;

        // Grey section: actual wake time
        html += `
          <div class="actual-wake-wrap">
            <label for="wake${n}">He woke up at a different time?</label>
            <input
              type="time"
              id="wake${n}"
              data-nap-wake="${ev.napIndex}"
              value="${wakeVal}"
              class="${wakeFilled ? 'filled' : ''}"
              aria-label="Actual wake time for nap ${n}"
            />
            <div class="hint">Only fill in if he woke at a different time than shown above ↑</div>
            ${wakeFilled ? `<button class="clear-btn" data-clear-wake="${ev.napIndex}">✕ Clear</button>` : ''}
          </div>
        `;

        // Short-nap callout (only shows when actual wake confirms it was short)
        if (wakeFilled && ev.isShort) {
          html += `
            <div class="short-nap-note">
              😮 Short nap! Next nap moved a little earlier to help him along.
            </div>
          `;
        }
      }

      // ── Catnap: show end time ───────────────────────────────
      if (ev.type === 'catnap') {
        html += `
          <div class="catnap-end">
            <div class="p-label">⏰ Wake him by:</div>
            <div class="p-time">${friendly(toStr(ev.predEndMins))}</div>
          </div>
        `;
      }

      // ── Bedtime: status badge ───────────────────────────────
      if (ev.type === 'bedtime') {
        const target  = CONFIG.DAYTIME_SLEEP_TARGET;
        const total   = ev.totalDaytimeMins;
        const diffMin = total - target;
        const diffTxt = diffMin === 0
          ? 'right on target'
          : diffMin > 0
            ? `${fmtDuration(Math.abs(diffMin))} over`
            : `${fmtDuration(Math.abs(diffMin))} under`;

        html += `
          <div class="bedtime-status status-${ev.bedStatus}">
            ${ev.bedMsg}
          </div>
        `;

        card.innerHTML = html;
        container.appendChild(card);

        // Sleep summary sits outside/below the bedtime card
        const summary = document.createElement('div');
        summary.className = 'sleep-summary';
        summary.innerHTML = `
          <span>📊 Total daytime sleep</span>
          <span class="total">
            ${fmtDuration(total)}
            <span style="font-size:.85rem;font-weight:500;color:#999;">(${diffTxt})</span>
          </span>
        `;
        container.appendChild(summary);

        // Don't fall through to the generic card.innerHTML = html below
        return;
      }

      card.innerHTML = html;
      container.appendChild(card);
    });

    // ── Wire inputs ONCE, after all cards are in the DOM ──────
    // This is the key fix: previously wireInputs() was called twice
    // (once inside the bedtime early-return, once here), causing
    // exponentially growing duplicate listeners and eventual crashes.
    wireInputs();
  }

  // ── Attach event listeners after each render ──────────────
  function wireInputs() {
    // Actual fall-asleep inputs (green sections)
    document.querySelectorAll('input[data-nap-start]').forEach(inp => {
      inp.addEventListener('change', onActualStartChange);
    });

    // Actual wake inputs (grey sections)
    document.querySelectorAll('input[data-nap-wake]').forEach(inp => {
      inp.addEventListener('change', onActualWakeChange);
    });

    // Clear buttons for actual starts
    document.querySelectorAll('button[data-clear-start]').forEach(btn => {
      btn.addEventListener('click', onClearStart);
    });

    // Clear buttons for actual wakes
    document.querySelectorAll('button[data-clear-wake]').forEach(btn => {
      btn.addEventListener('click', onClearWake);
    });
  }


  // ============================================================
  // STATE
  //
  //   actualNapStart[i] — time George FELL ASLEEP (null = on schedule)
  //   actualWake[i]     — time George WOKE UP     (null = use predicted)
  // ============================================================

  let actualNapStart = [null, null];
  let actualWake     = [null, null];


  // ============================================================
  // EVENT HANDLERS
  // ============================================================

  function onActualStartChange(e) {
    const i = parseInt(e.target.dataset.napStart, 10);
    actualNapStart[i] = e.target.value || null;
    // Changing when he fell asleep doesn't invalidate other overrides —
    // just recalculate with the new start time.
    render();
  }

  function onActualWakeChange(e) {
    const i = parseInt(e.target.dataset.napWake, 10);
    actualWake[i] = e.target.value || null;

    // When Nap N's wake time changes, downstream wake times are no longer
    // valid (the next nap's suggested start shifts). Clear them so the
    // schedule recalculates cleanly from this point forward.
    for (let j = i + 1; j < actualWake.length; j++) {
      actualWake[j] = null;
    }

    render();
  }

  function onClearStart(e) {
    const i = parseInt(e.target.dataset.clearStart, 10);
    actualNapStart[i] = null;
    render();
  }

  function onClearWake(e) {
    const i = parseInt(e.target.dataset.clearWake, 10);
    actualWake[i] = null;
    for (let j = i + 1; j < actualWake.length; j++) {
      actualWake[j] = null;
    }
    render();
  }

  function onMorningWakeChange() {
    // Reset everything when the morning wake time changes
    actualNapStart = [null, null];
    actualWake     = [null, null];
    render();
  }

  // ── Wire morning wake input ──────────────────────────────
  const mwInput = document.getElementById('morningWake');
  mwInput.addEventListener('change', onMorningWakeChange);
  mwInput.addEventListener('input',  onMorningWakeChange);

  // ── Default to 7:00 AM and render immediately ────────────
  mwInput.value = '07:00';
  render();

  </script>
</body>
</html>
